name: Build ModBot Executables

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  # ── Windows .exe ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModBot-Windows
          path: dist/ModBot.exe
          retention-days: 30

  # ── macOS .app ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.app)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller build.spec

      - name: Zip app bundle
        run: |
          cd dist
          zip -r ModBot-macOS.zip ModBot.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModBot-macOS
          path: dist/ModBot-macOS.zip
          retention-days: 30
